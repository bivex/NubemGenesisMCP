# Fase 2 MCPs Configuration - 8 Critical MCPs
# Implementation Date: 2025-10-26
# Based on Expert Panel Consensus (12/12 approval)

metadata:
  version: "2.0.0"
  fase: 2
  total_mcps: 8
  deployment_target: "development → production"
  status: "ready_to_deploy"
  expert_panel_approval: "unanimous_12_of_12"

mcps:
  # ========================================
  # GOOGLE WORKSPACE - All-in-One (#1 Priority)
  # ========================================
  - name: "google-workspace"
    display_name: "Google Workspace (All-in-One)"
    enabled: true
    priority: 1  # CRITICAL
    category: "google_workspace"

    description: |
      Complete Google Workspace integration with 10 services:
      - Gmail (email management)
      - Google Drive (file storage)
      - Google Calendar (scheduling)
      - Google Docs (document editing)
      - Google Sheets (spreadsheets)
      - Google Slides (presentations)
      - Google Forms (forms & surveys)
      - Google Tasks (task management)
      - Google Chat (team communication)
      - Google Search (workspace search)

    capabilities:
      - "email_send_read"
      - "file_management"
      - "calendar_events"
      - "document_editing"
      - "spreadsheet_operations"
      - "form_creation"
      - "task_management"
      - "team_chat"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "taylorwilsdon/google_workspace_mcp"

    credentials_source: "kubernetes"
    secret_name: "mcp-google-workspace-secrets"
    required_secrets:
      - "GOOGLE_CLIENT_ID"
      - "GOOGLE_CLIENT_SECRET"
      - "GOOGLE_REFRESH_TOKEN"

    lazy_load: false  # Preload - too important
    timeout_seconds: 45
    retry_attempts: 3
    cache_ttl_seconds: 300
    rate_limit_per_minute: 100

    metadata:
      setup_complexity: "medium"
      setup_time_hours: 2
      cost_per_month: 0  # Using existing workspace
      roi: "1500%+"
      expert_score: "50/50"
      services_count: 10

  # ========================================
  # SLACK - Communication (#2 Priority)
  # ========================================
  - name: "slack"
    display_name: "Slack"
    enabled: true
    priority: 1  # CRITICAL
    category: "communication"

    description: |
      Slack integration for team communication and notifications.
      Essential for alerts, notifications, and team collaboration.

    capabilities:
      - "send_messages"
      - "create_threads"
      - "upload_files"
      - "channel_management"
      - "notifications"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-slack"

    credentials_source: "kubernetes"
    secret_name: "mcp-slack-secrets"
    required_secrets:
      - "SLACK_BOT_TOKEN"
      - "SLACK_TEAM_ID"

    lazy_load: true
    timeout_seconds: 30
    retry_attempts: 3
    cache_ttl_seconds: 60
    rate_limit_per_minute: 60

    metadata:
      setup_complexity: "low"
      setup_time_hours: 0.5
      cost_per_month: 0  # Free tier
      roi: "1000%+"
      expert_score: "48/50"

  # ========================================
  # POSTGRESQL - Relational Database (#3 Priority)
  # ========================================
  - name: "postgresql"
    display_name: "PostgreSQL"
    enabled: true
    priority: 1  # CRITICAL
    category: "database"

    description: |
      PostgreSQL database access for relational data queries.
      Industry standard for structured data.

    capabilities:
      - "sql_queries"
      - "table_inspection"
      - "schema_discovery"
      - "read_only_mode"
      - "json_support"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-postgres"

    credentials_source: "kubernetes"
    secret_name: "mcp-postgres-secrets"
    required_secrets:
      - "DATABASE_URL"

    lazy_load: true
    timeout_seconds: 30
    retry_attempts: 3
    cache_ttl_seconds: 600
    rate_limit_per_minute: 120

    metadata:
      setup_complexity: "low"
      setup_time_hours: 0.75
      cost_per_month: 0  # Supabase free tier
      roi: "800%+"
      expert_score: "47/50"

  # ========================================
  # MONGODB - NoSQL Database (#4 Priority)
  # ========================================
  - name: "mongodb"
    display_name: "MongoDB"
    enabled: true
    priority: 2  # HIGH
    category: "database"

    description: |
      MongoDB database access for document-oriented data.
      Perfect for semi-structured and JSON data.

    capabilities:
      - "document_crud"
      - "aggregation_pipelines"
      - "json_queries"
      - "index_management"
      - "flexible_schema"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@mongodb/mcp-server-mongodb"

    credentials_source: "kubernetes"
    secret_name: "mcp-mongodb-secrets"
    required_secrets:
      - "MONGODB_URI"

    lazy_load: true
    timeout_seconds: 30
    retry_attempts: 3
    cache_ttl_seconds: 300
    rate_limit_per_minute: 100

    metadata:
      setup_complexity: "low"
      setup_time_hours: 0.5
      cost_per_month: 0  # Atlas free tier
      roi: "700%+"
      expert_score: "43/50"

  # ========================================
  # REDIS - Cache & Pub/Sub (#5 Priority)
  # ========================================
  - name: "redis"
    display_name: "Redis"
    enabled: true
    priority: 2  # HIGH
    category: "database"

    description: |
      Redis for caching, key-value storage, and pub/sub messaging.
      Critical for performance optimization.

    capabilities:
      - "key_value_operations"
      - "pub_sub_messaging"
      - "cache_management"
      - "ttl_configuration"
      - "data_structures"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@redis/mcp-server-redis"

    credentials_source: "kubernetes"
    secret_name: "mcp-redis-secrets"
    required_secrets:
      - "REDIS_URL"

    lazy_load: true
    timeout_seconds: 20
    retry_attempts: 3
    cache_ttl_seconds: 60
    rate_limit_per_minute: 200

    metadata:
      setup_complexity: "low"
      setup_time_hours: 0.5
      cost_per_month: 0  # Redis Cloud free tier
      roi: "600%+"
      expert_score: "40/50"

  # ========================================
  # SQLITE - Embedded Database (#6 Priority)
  # ========================================
  - name: "sqlite"
    display_name: "SQLite"
    enabled: true
    priority: 2  # HIGH
    category: "database"

    description: |
      SQLite for local/embedded database operations.
      Perfect for development and local data storage.

    capabilities:
      - "sql_queries"
      - "local_storage"
      - "zero_configuration"
      - "file_based"
      - "development_friendly"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-sqlite"
      env:
        SQLITE_DB_PATH: "/app/data/sqlite"

    credentials_source: "none"

    lazy_load: true
    timeout_seconds: 20
    retry_attempts: 2
    cache_ttl_seconds: 300
    rate_limit_per_minute: 150

    metadata:
      setup_complexity: "very_low"
      setup_time_hours: 0.25
      cost_per_month: 0
      roi: "400%+"
      expert_score: "44/50"

  # ========================================
  # DOCKER - Container Management (#7 Priority)
  # ========================================
  - name: "docker"
    display_name: "Docker"
    enabled: true
    priority: 1  # CRITICAL
    category: "development"

    description: |
      Docker integration for container management and debugging.
      Essential for development and troubleshooting.

    capabilities:
      - "list_containers"
      - "inspect_containers"
      - "view_logs"
      - "manage_images"
      - "network_management"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-docker"

    credentials_source: "environment"
    env_vars:
      DOCKER_HOST: "unix:///var/run/docker.sock"

    lazy_load: true
    timeout_seconds: 30
    retry_attempts: 2
    cache_ttl_seconds: 30
    rate_limit_per_minute: 50

    metadata:
      setup_complexity: "medium"
      setup_time_hours: 0.5
      cost_per_month: 0
      roi: "500%+"
      expert_score: "45/50"

  # ========================================
  # BRAVE SEARCH - Web Search (#8 Priority)
  # ========================================
  - name: "brave-search"
    display_name: "Brave Search"
    enabled: true
    priority: 2  # HIGH
    category: "search"

    description: |
      Brave Search for real-time web search.
      Privacy-focused alternative to Google Search.

    capabilities:
      - "web_search"
      - "real_time_data"
      - "privacy_focused"
      - "no_tracking"
      - "fresh_results"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-brave-search"

    credentials_source: "kubernetes"
    secret_name: "mcp-brave-secrets"
    required_secrets:
      - "BRAVE_API_KEY"

    lazy_load: true
    timeout_seconds: 30
    retry_attempts: 3
    cache_ttl_seconds: 300
    rate_limit_per_minute: 30  # Brave free tier: 2K/month

    metadata:
      setup_complexity: "low"
      setup_time_hours: 0.25
      cost_per_month: 0  # Free tier 2K queries
      roi: "600%+"
      expert_score: "44/50"

# ========================================
# DEPLOYMENT CONFIGURATION
# ========================================

deployment:
  strategy: "rolling_update"
  environments:
    - name: "development"
      namespace: "development"
      replicas: 2
      testing_required: true
      approval_required: false

    - name: "production"
      namespace: "production"
      replicas: 3
      testing_required: true
      approval_required: true
      min_uptime_days: 7  # Must run 7 days in dev first

# ========================================
# HEALTH CHECK CONFIGURATION
# ========================================

health_checks:
  enabled: true
  interval_seconds: 60
  timeout_seconds: 10
  failure_threshold: 3
  success_threshold: 2

  endpoints:
    - path: "/health"
      expected_status: 200
    - path: "/mcp"
      expected_status: [200, 401]

# ========================================
# MONITORING CONFIGURATION
# ========================================

monitoring:
  metrics_enabled: true
  prometheus_scrape: true
  grafana_dashboards:
    - "mcp-overview"
    - "mcp-performance"
    - "mcp-errors"

  alerts:
    - name: "HighErrorRate"
      condition: "error_rate > 10%"
      severity: "warning"

    - name: "MCPDown"
      condition: "mcp_unavailable > 5m"
      severity: "critical"

    - name: "SlowResponseTime"
      condition: "p95_latency > 1000ms"
      severity: "warning"

# ========================================
# ROLLBACK PLAN
# ========================================

rollback:
  enabled: true
  automatic: true
  triggers:
    - "error_rate > 25%"
    - "availability < 95%"
    - "critical_mcp_failure"

  procedure:
    - "Stop new deployments"
    - "Scale down Fase 2 pods to 0"
    - "Scale up Fase 1 pods"
    - "Verify Fase 1 health"
    - "Notify team"

# ========================================
# SUCCESS METRICS
# ========================================

success_metrics:
  technical:
    startup_time_max_seconds: 10
    memory_baseline_max_gb: 1.5
    response_time_p95_max_ms: 500
    cpu_overhead_max_percent: 5
    success_rate_min_percent: 95
    uptime_min_percent: 99.9

  business:
    active_mcps_per_day_min: 5
    queries_using_new_mcps_percent: 80
    time_saved_hours_per_week: 20
    user_satisfaction_min: 8

  adoption:
    gmail_operations_per_day_min: 10
    slack_notifications_per_day_min: 5
    database_queries_per_day_min: 30

# ========================================
# COST ANALYSIS
# ========================================

cost_analysis:
  total_monthly_cost: 0  # All using free tiers initially
  breakdown:
    google_workspace: 0  # Existing workspace
    slack: 0  # Free tier
    postgresql: 0  # Supabase free
    mongodb: 0  # Atlas free
    redis: 0  # Redis Cloud free
    sqlite: 0  # Local
    docker: 0  # Local
    brave_search: 0  # Free tier 2K queries

  scaling_costs:
    if_exceed_free_tier:
      slack: "8/user/month"
      postgresql: "25/month (Supabase Pro)"
      mongodb: "57/month (M10 cluster)"
      redis: "5/month (30MB)"
      brave_search: "5/month (20K queries)"

    estimated_month_2: "0-50"
    estimated_month_3: "50-100"

# ========================================
# NOTES
# ========================================

notes: |
  Fase 2 MCPs Selected by Expert Panel Consensus (12/12 unanimous approval):

  1. Google Workspace (#1) - 10 services in 1 MCP, massive ROI
  2. Slack (#2) - Critical for team communication
  3. PostgreSQL (#3) - Relational data access
  4. MongoDB (#4) - Document store for flexible data
  5. Redis (#5) - Caching and pub/sub
  6. SQLite (#6) - Local development database
  7. Docker (#7) - Container debugging
  8. Brave Search (#8) - Real-time web search

  Total: 8 MCPs covering ~15 distinct services
  Coverage: ~40% of common enterprise needs
  Cost: $0/month (all free tiers)
  ROI: 1500%+ expected in first month

  Next Steps:
  1. Create Kubernetes secrets for each MCP
  2. Deploy to development namespace
  3. Run comprehensive testing (80+ tests)
  4. Monitor for 1 week
  5. Deploy to production with rolling update

  Timeline: 2 weeks (Week 3-4 of roadmap)
