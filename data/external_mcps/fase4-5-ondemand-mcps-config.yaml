# ========================================
# CATEGORY 6: ADDITIONAL CLOUD PROVIDERS
# ========================================

more_cloud:
  - name: "azure"
    display_name: "Microsoft Azure"
    enabled: false
    priority: 3
    category: "cloud"

    triggers_for_activation:
      - "Client infrastructure on Azure"
      - "Azure-specific services needed"

    note: "GCP + AWS covers most needs, Azure only if required"
    estimated_setup: "1.5 hours"

  - name: "cloudflare"
    display_name: "Cloudflare"
    enabled: false
    priority: 3
