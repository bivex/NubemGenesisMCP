# Fase 4-5 MCPs Configuration - 15-20 On-Demand MCPs
# Implementation Date: 2025-12+ (Week 11-16)
# Strategy: Implement based on actual demand from Fase 2-3 usage

metadata:
  version: "4.0.0"
  fase: "4-5"
  approach: "on_demand"
  total_mcps: 15-20
  cumulative_total: 35-40
  deployment_target: "as_needed"
  status: "implement_on_demand"
  depends_on: "fase3_operational_1month"

# ========================================
# ON-DEMAND IMPLEMENTATION STRATEGY
# ========================================

implementation_strategy:
  approach: "demand_driven"

  triggers:
    - "User requests specific integration >3 times"
    - "Clear business value identified"
    - "No suitable alternative exists"
    - "Cost-benefit analysis positive"

  decision_matrix:
    priority_1_implement_immediately:
      - "Critical business need"
      - "Revenue impact >$10K/month"
      - "Time savings >20 hours/week"

    priority_2_implement_this_quarter:
      - "High value but not urgent"
      - "Multiple user requests"
      - "Strategic importance"

    priority_3_backlog:
      - "Nice-to-have"
      - "Low usage expected"
      - "High cost vs low benefit"

# ========================================
# CATEGORY 1: ANALYTICS (Implement if analytics need emerges)
# ========================================

analytics_mcps:
  - name: "mixpanel"
    display_name: "Mixpanel"
    enabled: false  # Enable on demand
    priority: 3
    category: "analytics"

    triggers_for_activation:
      - "Need for product analytics"
      - "User behavior tracking required"
      - "Funnel analysis needed"

    estimated_setup: "1 hour"
    monthly_cost: "25-100"
    expert_score: "40/50"

  - name: "amplitude"
    display_name: "Amplitude"
    enabled: false
    priority: 3
    category: "analytics"

    triggers_for_activation:
      - "Advanced cohort analysis needed"
      - "Mixpanel alternative required"

    estimated_setup: "1 hour"
    monthly_cost: "50-200"
    expert_score: "39/50"

  - name: "google-analytics"
    display_name: "Google Analytics"
    enabled: false
    priority: 3
    category: "analytics"

    note: "Already covered by Google Workspace if needed for basic analytics"

# ========================================
# CATEGORY 2: MORE DATABASES (If specialized DB needs emerge)
# ========================================

additional_databases:
  - name: "mysql"
    display_name: "MySQL"
    enabled: false
    priority: 3
    category: "database"

    triggers_for_activation:
      - "Legacy MySQL database needs access"
      - "Client uses MySQL exclusively"

    note: "PostgreSQL covers most SQL needs, only add if specific MySQL requirement"
    estimated_setup: "0.5 hours"
    monthly_cost: "0-25"

  - name: "elasticsearch"
    display_name: "Elasticsearch"
    enabled: false
    priority: 3
    category: "database"

    triggers_for_activation:
      - "Full-text search requirements"
      - "Log analytics at scale"
      - "Complex aggregations needed"

    estimated_setup: "2 hours"
    monthly_cost: "50-500"

# ========================================
# CATEGORY 3: ADDITIONAL PROJECT MANAGEMENT
# ========================================

more_pm_tools:
  - name: "asana"
    display_name: "Asana"
    enabled: false
    priority: 3
    category: "project_management"

    triggers_for_activation:
      - "Team prefers Asana over Jira"
      - "Asana-specific workflow needed"

    note: "Jira already covers PM, only add if team uses Asana"
    estimated_setup: "1 hour"
    monthly_cost: "10-30"

  - name: "linear"
    display_name: "Linear"
    enabled: false
    priority: 3
    category: "project_management"

    triggers_for_activation:
      - "Engineering team prefers Linear"
      - "Need modern PM tool"

    note: "Alternative to Jira for engineering teams"
    estimated_setup: "0.75 hours"
    monthly_cost: "8/user"

  - name: "monday"
    display_name: "Monday.com"
    enabled: false
    priority: 3
    category: "project_management"

    triggers_for_activation:
      - "Client uses Monday.com"
      - "Visual workflow management needed"

# ========================================
# CATEGORY 4: SOCIAL MEDIA (Only if social media management needed)
# ========================================

social_media_mcps:
  - name: "twitter"
    display_name: "Twitter/X"
    enabled: false
    priority: 3
