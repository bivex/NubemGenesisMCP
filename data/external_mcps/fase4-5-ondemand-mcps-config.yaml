# ========================================
# RECOMMENDED INITIAL SUBSET (15 MCPs)
# ========================================

recommended_initial_phase_4:
  description: "If implementing Phase 4, start with these 15 MCPs based on likely demand"

  mcps:
    # Analytics (2)
    - "mixpanel"
    - "amplitude"

    # Databases (2)
    - "mysql"
    - "elasticsearch"

    # PM Tools (3)
    - "asana"
    - "linear"
    - "monday"

    # Social Media (2)
    - "twitter"
    - "linkedin"

    # E-commerce (2)
    - "shopify"
    - "woocommerce"

    # Cloud (2)
    - "azure"
    - "cloudflare"

    # CRM (1)
    - "salesforce"

    # Monitoring (1)
    - "datadog"

  total: 15
  estimated_setup_time: "18-22 hours"
  estimated_monthly_cost: "300-800"

# ========================================
# DECISION FRAMEWORK
# ========================================

decision_framework:
  before_adding_any_mcp:
    questions:
      - "Is this need already covered by existing 18 MCPs?"
      - "Can Google Workspace cover this? (it has 10 services)"
      - "Is there a workaround using existing tools?"
      - "What is the expected usage frequency?"
      - "What is the cost vs benefit?"
      - "How many users will use this?"

    approval_required_if:
      - "Monthly cost >$50"
      - "Setup time >2 hours"
      - "Adds operational complexity"

    automatic_approval_if:
      - "Requested by >3 users"
      - "Clear revenue impact"
      - "Free tier available"
      - "Setup time <1 hour"

  implementation_process:
    1: "User request received"
    2: "Evaluate against existing capabilities"
    3: "Cost-benefit analysis"
    4: "Add to backlog or implement"
    5: "Deploy to development"
    6: "Monitor usage for 1 week"
    7: "Deploy to production if used"
    8: "Review after 1 month - keep or remove"

# ========================================
# USAGE TRACKING
# ========================================

usage_tracking:
  enabled: true

  metrics_to_track:
    - "API calls per MCP per day"
    - "Unique users per MCP"
    - "Success rate per MCP"
    - "Cost per MCP per month"
    - "Time saved estimation"

  review_frequency: "monthly"

  removal_criteria:
    - "Zero usage for 30 days"
    - "Cost >$100/month with <10 API calls/day"
    - "Error rate >20%"
    - "Duplicate functionality with better alternative"

# ========================================
# NOTES
# ========================================

notes: |
  FASE 4-5: ON-DEMAND IMPLEMENTATION STRATEGY

  Philosophy:
  - Don't add MCPs "because we can"
  - Every MCP has operational overhead
  - Quality > Quantity
  - Usage-driven decisions

  Current state after Fase 3:
  - 18 MCPs covering core needs
  - ~70% of common use cases covered
  - Strong foundation in place

  Phase 4-5 approach:
  - Monitor Fase 2-3 usage for 1 month
  - Identify gaps in actual usage
  - Implement only what's needed
  - Target: 35-40 total MCPs (add 15-20)

  Expert Panel Recommendation:
  - "40 MCPs bien elegidos > 100 MCPs mediocres"
  - Focus on frequently used integrations
  - Maintain high quality standards
  - Keep operational complexity manageable

  Timeline: Flexible, implement as needed over months 4-6

  Success Metrics:
  - Each new MCP has >50 API calls/month
  - Cost per MCP <$50/month (or clear ROI)
  - Error rate <5%
  - User satisfaction >8/10
