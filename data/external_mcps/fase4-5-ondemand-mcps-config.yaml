      - "LinkedIn posting needed"

# ========================================
# CATEGORY 5: MORE E-COMMERCE (Only if e-commerce focus)
# ========================================

ecommerce_mcps:
  - name: "shopify"
    display_name: "Shopify"
    enabled: false
    priority: 3
