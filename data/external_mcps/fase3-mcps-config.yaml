# Fase 3 MCPs Configuration - 10 High-Priority MCPs
# Implementation Date: 2025-11 (Week 7-8)
# Dependency: Fase 2 must be operational for 2+ weeks

metadata:
  version: "3.0.0"
  fase: 3
  total_mcps: 10
  cumulative_total: 18  # 8 from Fase 2 + 10 from Fase 3
  deployment_target: "development → production"
  status: "ready_after_fase2"
  depends_on: "fase2_operational_2weeks"

mcps:
  # ========================================
  # AWS - Multi-Cloud (#1 Fase 3)
  # ========================================
  - name: "aws"
    display_name: "Amazon Web Services"
    enabled: true
    priority: 2  # HIGH
    category: "cloud"

    description: |
      AWS integration for multi-cloud strategy.
      Complements GCP for cross-cloud operations.

    capabilities:
      - "ec2_management"
      - "s3_operations"
      - "lambda_functions"
      - "cloudwatch_logs"
      - "iam_management"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@aws/mcp-server-aws"

    credentials_source: "kubernetes"
    secret_name: "mcp-aws-secrets"
    required_secrets:
      - "AWS_ACCESS_KEY_ID"
      - "AWS_SECRET_ACCESS_KEY"
      - "AWS_REGION"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 600
    rate_limit_per_minute: 100

    metadata:
      expert_score: "40/50"
      setup_time_hours: 1
      cost_per_month: 0  # Pay-per-use

  # ========================================
  # SENTRY - Error Tracking (#2 Fase 3)
  # ========================================
  - name: "sentry"
    display_name: "Sentry"
    enabled: true
    priority: 1  # CRITICAL (for production)
    category: "monitoring"

    description: |
      Sentry for error tracking and debugging.
      Critical for production support and issue resolution.

    capabilities:
      - "error_tracking"
      - "stack_traces"
      - "breadcrumbs"
      - "issue_resolution"
      - "performance_monitoring"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@sentry/mcp-server-sentry"

    credentials_source: "kubernetes"
    secret_name: "mcp-sentry-secrets"
    required_secrets:
      - "SENTRY_AUTH_TOKEN"
      - "SENTRY_ORG_SLUG"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 60
    rate_limit_per_minute: 60

    metadata:
      expert_score: "46/50"
      setup_time_hours: 0.5
      cost_per_month: 0  # 5K errors/month free

  # ========================================
  # JIRA - Project Management (#3 Fase 3)
  # ========================================
  - name: "jira"
    display_name: "Jira"
    enabled: true
    priority: 2  # HIGH
    category: "project_management"

    description: |
      Jira integration for project management and issue tracking.
      Essential for agile teams.

    capabilities:
      - "issue_crud"
      - "jql_search"
      - "workflow_transitions"
      - "comments"
      - "sprint_management"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@atlassian/mcp-server-jira"

    credentials_source: "kubernetes"
    secret_name: "mcp-jira-secrets"
    required_secrets:
      - "JIRA_API_TOKEN"
      - "JIRA_URL"
      - "JIRA_EMAIL"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 300
    rate_limit_per_minute: 60

    metadata:
      expert_score: "42/50"
      setup_time_hours: 1
      cost_per_month: 10  # Standard plan

  # ========================================
  # NOTION - Documentation (#4 Fase 3)
  # ========================================
  - name: "notion"
    display_name: "Notion"
    enabled: true
    priority: 2  # HIGH
    category: "project_management"

    description: |
      Notion integration for documentation and knowledge management.
      Central documentation hub.

    capabilities:
      - "page_crud"
      - "database_operations"
      - "workspace_search"
      - "templates"
      - "collaboration"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@notionhq/mcp-server-notion"

    credentials_source: "kubernetes"
    secret_name: "mcp-notion-secrets"
    required_secrets:
      - "NOTION_API_KEY"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 300
    rate_limit_per_minute: 50

    metadata:
      expert_score: "42/50"
      setup_time_hours: 0.75
      cost_per_month: 10  # Plus plan

  # ========================================
  # TEAMS - Enterprise Communication (#5 Fase 3)
  # ========================================
  - name: "teams"
    display_name: "Microsoft Teams"
    enabled: true
    priority: 2  # HIGH
    category: "communication"

    description: |
      Microsoft Teams for enterprise communication.
      Essential for organizations using Microsoft ecosystem.

    capabilities:
      - "send_messages"
      - "channel_management"
      - "call_integration"
      - "file_sharing"
      - "meeting_scheduling"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@inditextech/mcp-teams-server"

    credentials_source: "kubernetes"
    secret_name: "mcp-teams-secrets"
    required_secrets:
      - "TEAMS_CLIENT_ID"
      - "TEAMS_CLIENT_SECRET"
      - "TEAMS_TENANT_ID"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 60
    rate_limit_per_minute: 60

    metadata:
      expert_score: "46/50"
      setup_time_hours: 1.5
      cost_per_month: 0  # Included in M365

  # ========================================
  # DISCORD - Community Communication (#6 Fase 3)
  # ========================================
  - name: "discord"
    display_name: "Discord"
    enabled: true
    priority: 3  # MEDIUM
    category: "communication"

    description: |
      Discord integration for community communication.
      Perfect for developer communities and support channels.

    capabilities:
      - "send_messages"
      - "channel_management"
      - "webhook_support"
      - "bot_commands"
      - "server_management"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@elyxlz/discord-mcp"

    credentials_source: "kubernetes"
    secret_name: "mcp-discord-secrets"
    required_secrets:
      - "DISCORD_BOT_TOKEN"
      - "DISCORD_SERVER_ID"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 60
    rate_limit_per_minute: 50

    metadata:
      expert_score: "44/50"
      setup_time_hours: 0.5
      cost_per_month: 0  # Free

  # ========================================
  # PUPPETEER - Browser Automation (#7 Fase 3)
  # ========================================
  - name: "puppeteer"
    display_name: "Puppeteer"
    enabled: true
    priority: 2  # HIGH
    category: "automation"

    description: |
      Puppeteer for browser automation and web scraping.
      Essential for testing and data extraction.

    capabilities:
      - "browser_automation"
      - "screenshot_capture"
      - "pdf_generation"
      - "form_filling"
      - "web_scraping"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-puppeteer"

    credentials_source: "none"

    lazy_load: true
    timeout_seconds: 60
    cache_ttl_seconds: 0  # No caching for dynamic content
    rate_limit_per_minute: 20

    metadata:
      expert_score: "41/50"
      setup_time_hours: 0.5
      cost_per_month: 0

  # ========================================
  # PLAYWRIGHT - E2E Testing (#8 Fase 3)
  # ========================================
  - name: "playwright"
    display_name: "Playwright"
    enabled: true
    priority: 2  # HIGH
    category: "development"

    description: |
      Playwright for end-to-end testing and automation.
      Modern alternative to Puppeteer with better cross-browser support.

    capabilities:
      - "cross_browser_testing"
      - "mobile_emulation"
      - "network_interception"
      - "visual_regression"
      - "api_testing"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@playwright/mcp-server-playwright"

    credentials_source: "none"

    lazy_load: true
    timeout_seconds: 60
    cache_ttl_seconds: 0
    rate_limit_per_minute: 20

    metadata:
      expert_score: "40/50"
      setup_time_hours: 0.5
      cost_per_month: 0

  # ========================================
  # HUBSPOT - CRM (#9 Fase 3)
  # ========================================
  - name: "hubspot"
    display_name: "HubSpot"
    enabled: true
    priority: 2  # HIGH
    category: "crm"

    description: |
      HubSpot CRM for customer relationship management.
      All-in-one marketing, sales, and service platform.

    capabilities:
      - "contact_management"
      - "deal_tracking"
      - "email_campaigns"
      - "sales_pipeline"
      - "reporting"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@hubspot/mcp-server-hubspot"

    credentials_source: "kubernetes"
    secret_name: "mcp-hubspot-secrets"
    required_secrets:
      - "HUBSPOT_API_KEY"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 600
    rate_limit_per_minute: 100

    metadata:
      expert_score: "41/50"
      setup_time_hours: 1
      cost_per_month: 50  # Starter plan

  # ========================================
  # STRIPE - Payments (#10 Fase 3)
  # ========================================
  - name: "stripe"
    display_name: "Stripe"
    enabled: true
    priority: 2  # HIGH
    category: "ecommerce"

    description: |
      Stripe for payment processing and subscription management.
      Industry leader in online payments.

    capabilities:
      - "payment_processing"
      - "subscription_management"
      - "customer_billing"
      - "invoice_generation"
      - "webhook_handling"

    transport:
      type: "stdio"
      command: "npx"
      args:
        - "-y"
        - "@stripe/mcp-server-stripe"

    credentials_source: "kubernetes"
    secret_name: "mcp-stripe-secrets"
    required_secrets:
      - "STRIPE_API_KEY"

    lazy_load: true
    timeout_seconds: 30
    cache_ttl_seconds: 300
    rate_limit_per_minute: 100

    metadata:
      expert_score: "39/50"
      setup_time_hours: 1
      cost_per_month: 0  # Transaction-based

# ========================================
# DEPLOYMENT CONFIGURATION
# ========================================

deployment:
  prerequisites:
    - "Fase 2 operational >2 weeks"
    - "Fase 2 success rate >95%"
    - "Security rotation implemented"
    - "Audit logging active"

  strategy: "rolling_update"
  environments:
    - name: "development"
      namespace: "development"
      replicas: 2
      testing_duration_days: 7

    - name: "production"
      namespace: "production"
      replicas: 3
      approval_required: true

# ========================================
# SUCCESS METRICS
# ========================================

success_metrics:
  technical:
    total_mcps_loaded: 18  # 8 + 10
    startup_time_max_seconds: 12
    memory_max_gb: 2.0
    response_time_p95_max_ms: 600

  adoption:
    jira_operations_per_day: 15
    notion_page_updates_per_day: 10
    sentry_issue_resolutions_per_week: 5
    aws_api_calls_per_day: 20

# ========================================
# COST ANALYSIS
# ========================================

cost_analysis:
  monthly_cost_estimate: "70-120"
  breakdown:
    jira: 10
    notion: 10
    hubspot: 50
    stripe: 0
    teams: 0
    others: 0

notes: |
  Fase 3 adds 10 high-priority MCPs selected by expert panel.

  Focus areas:
  - Multi-cloud (AWS)
  - Error tracking (Sentry)
  - Project management (Jira, Notion)
  - Communication (Teams, Discord)
  - Automation (Puppeteer, Playwright)
  - CRM (HubSpot)
  - Payments (Stripe)

  Timeline: 2 weeks (Week 7-8)
  Dependencies: Fase 2 must be stable
  Total MCPs: 18 (8 + 10)
  Cost: $70-120/month
