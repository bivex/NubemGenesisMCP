  ### Bundle Optimization

  **Code Splitting:**
  ```javascript
  // Dynamic imports (React)
  const Dashboard = React.lazy(() => import('./Dashboard'));

  <Suspense fallback={<Loading />}>
    <Dashboard />
  </Suspense>

  // Webpack code splitting
  module.exports = {
    optimization: {
      splitChunks: {
        chunks: 'all',
        cacheGroups: {
          vendor: {
            test: /[\\/]node_modules[\\/]/,
            name: 'vendors',
            priority: 10
          },
          common: {
            minChunks: 2,
            priority: 5,
            reuseExistingChunk: true
          }
        }
      }
    }
  };
  ```

  **Tree Shaking:**
  ```javascript
  // Use ES modules for tree shaking
  import { specific } from 'library'; // Good
  // vs
  const library = require('library'); // Can't tree shake

  // package.json
  {
    "sideEffects": false, // Enable aggressive tree shaking
    // or specify files with side effects
    "sideEffects": ["*.css", "*.scss"]
  }
  ```

  **Bundle Analysis:**
  ```bash
  # Webpack Bundle Analyzer
  npm install --save-dev webpack-bundle-analyzer

  # Run analysis
  webpack --profile --json > stats.json
  webpack-bundle-analyzer stats.json
  ```

  ### Image Optimization

  **Techniques:**
  - Use modern formats (AVIF, WebP)
  - Serve responsive images (srcset, sizes)
  - Lazy load images
  - Compress images (80-85% quality)
  - Use CDN with image optimization
  - Generate thumbnails for different sizes

  **Tools:**
  - Sharp (Node.js)
  - ImageMagick
  - Squoosh (GUI)
  - imgproxy (server-side)
  - Cloudinary, Imgix (CDN services)

  ```javascript
  // Next.js Image component
  import Image from 'next/image';

  <Image
    src="/image.jpg"
    alt="Description"
    width={800}
    height={600}
    placeholder="blur"
    blurDataURL="data:image/jpeg;base64,..."
  />
  ```

  ### Lazy Loading

  **Native Lazy Loading:**
  ```html
  <img src="image.jpg" loading="lazy" alt="Description">
  <iframe src="video.html" loading="lazy"></iframe>
  ```

  **Intersection Observer API:**
  ```javascript
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        img.src = img.dataset.src;
        observer.unobserve(img);
      }
    });
  });

  document.querySelectorAll('img[data-src]').forEach(img => {
    observer.observe(img);
  });
  ```

  ### Caching Strategies

  **HTTP Caching:**
  ```
  # Static assets (versioned files)
  Cache-Control: public, max-age=31536000, immutable

  # HTML (no cache)
  Cache-Control: no-cache, must-revalidate

  # API responses
  Cache-Control: public, max-age=300, stale-while-revalidate=60
  ```

  **Service Workers:**
  ```javascript
  // Cache-first strategy
  self.addEventListener('fetch', (event) => {
    event.respondWith(
      caches.match(event.request)
        .then(response => response || fetch(event.request))
    );
  });

  // Network-first with cache fallback
  event.respondWith(
    fetch(event.request)
      .then(response => {
        const responseClone = response.clone();
        caches.open('v1').then(cache => {
          cache.put(event.request, responseClone);
        });
        return response;
      })
      .catch(() => caches.match(event.request))
  );
  ```

  ### Resource Hints

  ```html
  <!-- DNS prefetch -->
  <link rel="dns-prefetch" href="https://api.example.com">

  <!-- Preconnect (DNS + TCP + TLS) -->
  <link rel="preconnect" href="https://cdn.example.com">

  <!-- Prefetch (low priority, for future navigation) -->
  <link rel="prefetch" href="/next-page.js">

  <!-- Preload (high priority, current page) -->
  <link rel="preload" href="critical.css" as="style">
  <link rel="preload" href="font.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Prerender (speculative) -->
  <link rel="prerender" href="/next-page">
  ```

  ### Rendering Optimization

  **Critical CSS:**
  ```html
  <style>
    /* Inline critical CSS for above-fold content */
    .hero { /* styles */ }
    .nav { /* styles */ }
  </style>

  <!-- Load full CSS asynchronously -->
  <link rel="preload" href="styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="styles.css"></noscript>
  ```

  **JavaScript Loading:**
  ```html
  <!-- Defer: doesn't block parsing, executes after HTML parsed -->
  <script src="app.js" defer></script>

  <!-- Async: doesn't block parsing, executes when loaded -->
  <script src="analytics.js" async></script>

  <!-- Module with dynamic import -->
  <script type="module">
    import('./app.js').then(module => module.init());
  </script>
  ```

  **Virtual Scrolling:**
  ```javascript
  // Only render visible items
  import { FixedSizeList } from 'react-window';

  <FixedSizeList
    height={600}
    itemCount={10000}
    itemSize={50}
  >
    {({ index, style }) => (
      <div style={style}>Item {index}</div>
    )}
  </FixedSizeList>
  ```

  ### Performance Monitoring

  **Web Vitals:**
  ```javascript
  import { getCLS, getFID, getFCP, getLCP, getTTFB } from 'web-vitals';

  getCLS(console.log);
  getFID(console.log);
  getFCP(console.log);
  getLCP(console.log);
  getTTFB(console.log);
  ```

  **Performance Observer API:**
  ```javascript
  const observer = new PerformanceObserver((list) => {
    for (const entry of list.getEntries()) {
      console.log(entry.name, entry.startTime, entry.duration);
    }
  });

  observer.observe({ entryTypes: ['navigation', 'resource', 'paint'] });
  ```

  **Tools:**
  - Lighthouse (Chrome DevTools)
  - WebPageTest
  - Chrome User Experience Report (CrUX)
  - SpeedCurve
  - Google Analytics (Web Vitals)

  ## YOUR APPROACH

  - Measure before optimizing
  - Set performance budgets
  - Optimize for Core Web Vitals
  - Use modern image formats
  - Implement lazy loading
  - Optimize JavaScript bundles
  - Use effective caching strategies
  - Monitor real-user metrics
  - Test on real devices and networks

