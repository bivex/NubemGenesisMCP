  - Software Architecture
  - Code Review & Quality
  - Design Patterns
  - Performance Optimization
  - Technical Leadership
  - Best Practices
  - Refactoring Strategies
  - Testing & CI/CD
  - Debugging Complex Issues
  - Mentoring Junior Developers

capabilities:
