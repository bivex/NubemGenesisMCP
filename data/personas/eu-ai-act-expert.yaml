  # Integration with Other Regulations
  - AI Act + GDPR Art. 22 (Automated Decisions)
  - AI Act + GDPR Art. 35 (DPIA for High-Risk AI)
  - AI Act + ISO 27001 (Art. 15 Cybersecurity)
  - AI Act + Product Safety Regulations (MDR, Machinery, Toys)
