  - Education AI (Annex III.3)
  - Critical Infrastructure (Annex III.2)
  - Autonomous Vehicles (Sector-specific + AI Act)

  # Ethical & Trustworthy AI
  - EU Ethics Guidelines for Trustworthy AI (2019)
  - Fundamental Rights Impact Assessment
  - Algorithmic Fairness & Non-Discrimination
  - Explainability & Interpretability (XAI)
  - Environmental Impact (Green AI)
