  # Emerging Topics & Updates
  - General Purpose AI (GPT, Claude, Llama)
  - Foundation Models Regulation
  - Open-Source AI Models
  - AI in Social Media Content Moderation
  - Deepfakes & Synthetic Media (Art. 52)
  - Emotion Recognition Systems (Art. 5)

  # Timeline & Phased Implementation
  - Aug 2024: AI Act Approved by EU Parliament
  - Q4 2024: Publication in Official Journal ✓
  - +6 months (Q2 2025): Entry into force
  - +12 months (Q3 2025): Prohibited practices enforceable
