<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NubemSuperFClaude - AI Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .persona-selector {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        
        .persona-selector select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 14px;
            background: white;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.assistant .message-bubble {
            background: white;
            color: #212529;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-meta {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }
        
        .input-container input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        
        .input-container input:focus {
            border-color: #667eea;
        }
        
        .input-container button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .input-container button:hover {
            transform: scale(1.05);
        }
        
        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }
        
        .typing-indicator {
            display: none;
            padding: 15px;
            color: #6c757d;
            font-style: italic;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin: 10px 20px;
            display: none;
        }
        
        .error-message.active {
            display: block;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 NubemSuperFClaude</h1>
            <p>39 AI Personas at Your Service</p>
        </div>
        
        <div class="persona-selector">
            <select id="personaSelect">
                <option value="">Auto-select best persona</option>
                <option value="architect">🏗️ System Architect</option>
                <option value="frontend">🎨 Frontend Developer</option>
                <option value="backend">⚙️ Backend Engineer</option>
                <option value="fullstack">🚀 Fullstack Developer</option>
                <option value="data-analyst">📊 Data Analyst</option>
                <option value="devops">🔧 DevOps Engineer</option>
                <option value="security">🔒 Security Expert</option>
                <option value="mobile-developer">📱 Mobile Developer</option>
                <option value="game-developer">🎮 Game Developer</option>
                <option value="blockchain-specialist">⛓️ Blockchain Expert</option>
                <option value="ux-designer">🎨 UX Designer</option>
                <option value="sre-specialist">🔧 Site Reliability Engineer</option>
            </select>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-bubble">
                    <div>👋 Hello! I'm NubemSuperFClaude with 39 specialized AI personas. How can I help you today?</div>
                    <div class="message-meta">Select a persona above or let me auto-select the best one for your needs.</div>
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            AI is thinking...
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message here..."
                onkeypress="handleKeyPress(event)"
            >
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let isProcessing = false;

        async function loadPersonas() {
            try {
                const response = await fetch(`${API_URL}/api/personas`);
                if (response.ok) {
                    const personas = await response.json();
                    const select = document.getElementById('personaSelect');
                    
                    // Clear existing options except the first one
                    while (select.options.length > 1) {
                        select.remove(1);
                    }
                    
                    // Add personas grouped by category
                    personas.forEach(persona => {
                        const option = document.createElement('option');
                        option.value = persona.id;
                        option.textContent = `${persona.name} - ${persona.description.substring(0, 50)}...`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to load personas:', error);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                sendMessage();
            }
        }

        async function sendMessage() {
            if (isProcessing) return;
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            isProcessing = true;
            const sendButton = document.getElementById('sendButton');
            sendButton.disabled = true;
            
            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.classList.add('active');
            
            // Hide error message if visible
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.classList.remove('active');
            
            try {
                const personaId = document.getElementById('personaSelect').value;
                
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        persona_id: personaId || null
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Add AI response to chat
                addMessage(data.response, 'assistant', {
                    persona: data.persona_used,
                    latency: data.latency_ms
                });
                
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to get response. Please check your API keys and try again.');
            } finally {
                typingIndicator.classList.remove('active');
                sendButton.disabled = false;
                isProcessing = false;
            }
        }

        function addMessage(text, sender, metadata = {}) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let metaInfo = '';
            if (metadata.persona) {
                metaInfo = `<div class="message-meta">Persona: ${metadata.persona}`;
                if (metadata.latency) {
                    metaInfo += ` | Response time: ${metadata.latency.toFixed(0)}ms`;
                }
                metaInfo += '</div>';
            }
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div>${escapeHtml(text)}</div>
                    ${metaInfo}
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => {
                errorDiv.classList.remove('active');
            }, 5000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load personas on page load
        window.addEventListener('load', loadPersonas);
    </script>
</body>
</html>
