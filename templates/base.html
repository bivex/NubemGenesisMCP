<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NubemSuperFClaude Secrets{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">

    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-18">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-gray-800 flex items-center">
                        <svg class="w-8 h-8 mr-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        NubemSuperFClaude Secrets
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    {% if user %}
                        <span class="text-base text-gray-600">{{ user.email }}</span>
                        <a href="/auth/logout" class="px-5 py-2.5 bg-red-500 text-white text-base font-medium rounded-lg hover:bg-red-600 transition-colors shadow-sm hover:shadow-md">
                            Logout
                        </a>
                    {% else %}
                        <a href="/auth/login" class="px-5 py-2.5 bg-blue-500 text-white text-base font-medium rounded-lg hover:bg-blue-600 transition-colors shadow-sm hover:shadow-md">
                            Login with Google
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white mt-12 py-6 border-t border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600">
            <p class="text-base">NubemSuperFClaude Secrets API v1.0.0 | Multi-Tenant Secrets Management</p>
        </div>
    </footer>

    <!-- Authentication Script -->
    <script src="/static/js/auth.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
