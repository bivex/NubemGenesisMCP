<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_title }} - NubemSuperFClaude</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-center;
            padding: 20px;
        }

        .error-container {
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 540px;
            width: 100%;
            text-align: center;
        }

        .error-icon {
            font-size: 72px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .error-message {
            color: #4a5568;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error-details {
            background: #f7fafc;
            border-left: 4px solid #4299e1;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 32px;
            text-align: left;
            color: #2d3748;
            font-size: 14px;
            line-height: 1.5;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            color: #a0aec0;
            font-size: 13px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <h1>{{ error_title }}</h1>
        <p class="error-message">{{ error_message }}</p>

        {% if error_details %}
        <div class="error-details">
            <strong>Details:</strong><br>
            {{ error_details }}
        </div>
        {% endif %}

        <a href="{{ retry_url }}" class="btn">Try Again</a>

        <div class="footer">
            <p>Need help? <a href="mailto:support@nubemsystems.es">Contact Support</a></p>
        </div>
    </div>
</body>
</html>
