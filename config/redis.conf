# Redis Configuration for NubemSuperFClaude
# Security and Performance optimizations

# Authentication
requirepass nubemclaude2025

# Network
bind 0.0.0.0
port 6379
timeout 300

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Security
protected-mode yes
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command SHUTDOWN NUBEM_SHUTDOWN
rename-command CONFIG NUBEM_CONFIG

# Performance
tcp-keepalive 300
tcp-backlog 511

# Logging
loglevel notice
logfile /data/redis.log

# Client connections
maxclients 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128